<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioHeritage Collections</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111; color: #fff; padding: 20px; }
        h1 { text-align: center; padding: 40px 0 10px; font-weight: 300; letter-spacing: 2px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
        .album { margin-bottom: 60px; }
        .album h2 { color: #eee; font-weight: 300; padding-bottom: 10px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .gallery img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; transition: transform 0.3s; cursor: pointer; }
        .gallery img:hover { transform: scale(1.03); }
        .footer { text-align: center; color: #555; padding: 40px 0 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>BioHeritage Collections</h1>
    <p class="subtitle">A virtual museum of biodiversity</p>
<div class="album"><h2>50mm Full Body</h2><div class="gallery"><img src="50mm Full Body/BUMBLEBEE 100MM NEW FLASH.jpg" alt="BUMBLEBEE 100MM NEW FLASH" loading="lazy"></div></div><div class="album"><h2>25mm Body Feature</h2><div class="gallery"><img src="25mm Body Feature/bumble bee 50mm.jpg" alt="bumble bee 50mm" loading="lazy"></div></div><div class="album"><h2>100mm Full Body</h2><div class="gallery"><img src="100mm Full Body/BUMPLE BEE EYE 25MM PMAX.jpg" alt="BUMPLE BEE EYE 25MM PMAX" loading="lazy"><img src="100mm Full Body/BUBLE BEE 25MM.jpg" alt="BUBLE BEE 25MM" loading="lazy"></div></div>
    <div class="footer">© 2026 • All rights reserved</div>
</body>
</html>
